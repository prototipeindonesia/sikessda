<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Penerima - Sikessda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="bg-blue-700 p-6 flex items-center sticky top-0 z-50 shadow-md">
        <a href="dashboard.html" class="text-white mr-4"><i class="fa-solid fa-arrow-left text-xl"></i></a>
        <div>
            <h1 class="text-white font-bold text-lg leading-none">Cek Penerima</h1>
            <p class="text-blue-200 text-[10px] uppercase font-medium mt-1 tracking-wider">Simulasi Gagal</p>
        </div>
    </div>

    <div class="p-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-6">
            <h2 class="text-slate-800 font-bold text-sm mb-4">Masukkan NIK Penerima</h2>
            <form id="formGagal" class="space-y-4">
                <input type="number" id="nik" placeholder="737301XXXXXXXXXX" 
                    class="block w-full px-4 py-4 border-2 border-slate-100 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none text-lg font-bold tracking-widest" required>
                
                <button type="submit" class="w-full bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center space-x-2">
                    <i class="fa-solid fa-magnifying-glass text-sm"></i>
                    <span>Cek Data Sekarang</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('formGagal').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Mencari...';
            
            // Simulasi redirect ke tidakditemukan.html
            setTimeout(() => {
                window.location.href = "tidakditemukan.html";
            }, 1200);
        });
    </script>
</body>
</html>
