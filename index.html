<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi - Sikessda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
        
        <div class="bg-blue-700 p-8 text-center relative">
            <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
                <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
                    <path d="M0 0h400v400H0z" fill="none"/>
                    <path d="M100 100l200 200M300 100L100 300" stroke="#fff" stroke-width="20"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">SIKESSDA</h1>
            <p class="text-blue-100 text-sm mt-1 uppercase tracking-widest font-medium">Sistem Informasi Kesejahteraan Sosial Daerah</p>
        </div>

        <div class="p-6">
            <div class="mb-6">
                <h2 class="text-xl font-bold text-slate-800">Registrasi Akun Baru</h2>
                <p class="text-sm text-slate-500">Silakan lengkapi data diri Anda untuk pengajuan bantuan.</p>
            </div>

            <form id="regForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">NIK (Nomor Induk Kependudukan)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <i class="fa-solid fa-id-card text-sm"></i>
                        </span>
                        <input type="number" id="nik" placeholder="Masukkan 16 digit NIK" 
                            class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-blue-600 outline-none transition-all text-slate-700 placeholder:text-slate-400" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Nama Lengkap</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <i class="fa-solid fa-user text-sm"></i>
                        </span>
                        <input type="text" id="nama" placeholder="Sesuai KTP" 
                            class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-blue-600 outline-none transition-all text-slate-700 placeholder:text-slate-400" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Nomor Handphone (WhatsApp)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <i class="fa-solid fa-phone text-sm"></i>
                        </span>
                        <input type="tel" id="no_hp" placeholder="081234567xxx" 
                            class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-blue-600 outline-none transition-all text-slate-700 placeholder:text-slate-400" required>
                    </div>
                </div>

                <button type="submit" 
                    class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3.5 rounded-lg transition-colors shadow-lg shadow-blue-200 flex items-center justify-center space-x-2 mt-4">
                    <span>Daftar Sekarang</span>
                    <i class="fa-solid fa-arrow-right-to-bracket text-sm"></i>
                </button>
            </form>

            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-slate-400">Sudah punya akun?</span></div>
            </div>

            <a href="login.html" 
                class="w-full flex items-center justify-center border-2 border-blue-100 text-blue-700 font-semibold py-3 rounded-lg hover:bg-blue-50 transition-all">
                Masuk ke Aplikasi
            </a>
        </div>

        <div class="bg-slate-50 p-4 text-center border-t border-slate-100">
            <p class="text-[10px] text-slate-400 font-medium uppercase tracking-tighter">
                &copy; 2026 Dinas Sosial - Kabupaten Pemalang
            </p>
        </div>
    </div>

    <script>
        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const nik = document.getElementById('nik').value;
            
            // Simulasi Alur: Validasi NIK -> Simpan -> Akun Aktif
            if(nik.length < 16) {
                alert("NIK harus 16 digit!");
                return;
            }

            const btn = e.target.querySelector('button');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Memvalidasi...';
            btn.disabled = true;

            setTimeout(() => {
                alert("Pendaftaran Berhasil! Akun Sikessda Anda telah aktif.");
                window.location.href = "login.html";
            }, 2000);
        });
    </script>
</body>
</html>
