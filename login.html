<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sikessda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-blue-900 min-h-screen flex items-center justify-center p-4">

    <div class="fixed inset-0 opacity-10 pointer-events-none">
        <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <pattern id="pattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
                    <path d="M0 40L40 0M0 0l40 40" stroke="#fff" stroke-width="1" fill="none"/>
                </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#pattern)" />
        </svg>
    </div>

    <div class="w-full max-w-md glass-effect rounded-3xl shadow-2xl overflow-hidden relative z-10 border border-white/20">
        
        <div class="pt-10 pb-6 px-8 text-center">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-700 rounded-2xl shadow-lg mb-4 text-white">
                <i class="fa-solid fa-shield-halved text-4xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-blue-900 tracking-tight">SIKESSDA</h1>
            <p class="text-slate-500 text-xs mt-2 font-medium tracking-widest uppercase">Pemerintah Kabupaten Pemalang</p>
        </div>

        <div class="px-8 pb-10">
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">NIK / Username</label>
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 group-focus-within:text-blue-600 transition-colors">
                            <i class="fa-solid fa-user-tie"></i>
                        </span>
                        <input type="number" id="nik" placeholder="Masukkan 16 digit NIK" 
                            class="block w-full pl-11 pr-4 py-3.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-600 focus:border-blue-600 outline-none transition-all text-slate-700 bg-slate-50/50" required>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-sm font-bold text-slate-700">Kata Sandi</label>
                        <a href="lupasandi.html" class="text-xs font-semibold text-blue-700 hover:text-blue-800 transition-colors">Lupa Sandi?</a>
                    </div>
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 group-focus-within:text-blue-600 transition-colors">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" id="password" placeholder="••••••••" 
                            class="block w-full pl-11 pr-4 py-3.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-600 focus:border-blue-600 outline-none transition-all text-slate-700 bg-slate-50/50" required>
                    </div>
                </div>

                <button type="submit" 
                    class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-200 flex items-center justify-center space-x-3 active:scale-95">
                    <span>Masuk ke Sistem</span>
                    <i class="fa-solid fa-right-to-bracket text-sm"></i>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                <p class="text-sm text-slate-500 mb-4">Belum memiliki akun pengusul?</p>
                <a href="index.html" 
                    class="inline-block text-sm font-bold text-blue-700 border-b-2 border-transparent hover:border-blue-700 transition-all pb-1">
                    Daftar Akun Baru
                </a>
            </div>
        </div>

        <div class="bg-slate-50/80 p-4 text-center border-t border-slate-100">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                DINAS SOSIAL &bull; KABUPATEN PEMALANG
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = e.target.querySelector('button');
            const originalContent = btn.innerHTML;
            
            // UI Loading: Simulasi Pengecekan Database
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Memvalidasi Data...';
            btn.disabled = true;

            setTimeout(() => {
                // Sesuai Diagram 1: Jika Valid -> Dashboard
                // Disini kita asumsikan valid untuk keperluan prototipe
                window.location.href = "dashboard.html";
            }, 1500);
        });
    </script>
</body>
</html>
