<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya - Sikessda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24">

    <div class="bg-blue-700 pt-10 pb-20 px-6 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-10 -mt-10 blur-2xl"></div>
        
        <div class="flex items-center space-x-4 relative z-10">
            <div class="w-20 h-20 bg-white p-1 rounded-3xl shadow-lg">
                <div class="w-full h-full bg-blue-100 rounded-[1.2rem] flex items-center justify-center text-blue-700">
                    <i class="fa-solid fa-user-tie text-3xl"></i>
                </div>
            </div>
            <div class="text-white">
                <h1 class="text-xl font-bold leading-tight">Maulia</h1>
                <p class="text-blue-200 text-xs font-medium uppercase tracking-widest mt-1">Pengusul Mandiri</p>
                <div class="mt-2 inline-flex items-center bg-blue-800/50 px-3 py-1 rounded-full border border-white/10">
                    <span class="w-2 h-2 bg-emerald-400 rounded-full mr-2"></span>
                    <span class="text-[10px] font-bold">AKUN TERVERIFIKASI</span>
                </div>
            </div>
        </div>
    </div>

    <div class="px-6 -mt-8 relative z-20">
        
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-6">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Informasi Personal</h3>
            
            <div class="space-y-4">
                <div class="flex items-center space-x-4 border-b border-slate-50 pb-3">
                    <div class="text-slate-400 w-5 text-center"><i class="fa-solid fa-id-card"></i></div>
                    <div class="flex-1">
                        <p class="text-[10px] text-slate-400 font-bold uppercase">NIK</p>
                        <p class="text-sm text-slate-700 font-semibold tracking-wider">7373012304950001</p>
                    </div>
                </div>

                <div class="flex items-center space-x-4 border-b border-slate-50 pb-3">
                    <div class="text-slate-400 w-5 text-center"><i class="fa-solid fa-phone-volume"></i></div>
                    <div class="flex-1">
                        <p class="text-[10px] text-slate-400 font-bold uppercase">No. Handphone</p>
                        <p class="text-sm text-slate-700 font-semibold">0821-4455-XXXX</p>
                    </div>
                    <button class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded">UBAH</button>
                </div>

                <div class="flex items-center space-x-4">
                    <div class="text-slate-400 w-5 text-center"><i class="fa-solid fa-map-location-dot"></i></div>
                    <div class="flex-1">
                        <p class="text-[10px] text-slate-400 font-bold uppercase">Alamat Domisili</p>
                        <p class="text-sm text-slate-700 font-semibold">Kabupaten Pemalang</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <button class="w-full px-5 py-4 flex items-center justify-between hover:bg-slate-50 border-b border-slate-50 transition-all">
                <div class="flex items-center space-x-4">
                    <div class="w-8 h-8 bg-purple-50 text-purple-600 rounded-lg flex items-center justify-center text-xs">
                        <i class="fa-solid fa-key"></i>
                    </div>
                    <span class="text-sm font-bold text-slate-700">Ganti Kata Sandi</span>
                </div>
                <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
            </button>

            <button class="w-full px-5 py-4 flex items-center justify-between hover:bg-slate-50 border-b border-slate-50 transition-all">
                <div class="flex items-center space-x-4">
                    <div class="w-8 h-8 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center text-xs">
                        <i class="fa-solid fa-circle-question"></i>
                    </div>
                    <span class="text-sm font-bold text-slate-700">Pusat Bantuan</span>
                </div>
                <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
            </button>

            <button onclick="handleLogout()" class="w-full px-5 py-4 flex items-center justify-between hover:bg-red-50 group transition-all">
                <div class="flex items-center space-x-4">
                    <div class="w-8 h-8 bg-red-50 text-red-600 rounded-lg flex items-center justify-center text-xs group-hover:bg-red-600 group-hover:text-white transition-all">
                        <i class="fa-solid fa-power-off"></i>
                    </div>
                    <span class="text-sm font-bold text-red-600">Keluar Aplikasi</span>
                </div>
                <i class="fa-solid fa-chevron-right text-red-200 text-xs"></i>
            </button>
        </div>

        <p class="text-center text-[10px] text-slate-300 font-bold uppercase tracking-[0.2em] mt-8">
            Sikessda Mobile v1.0.4-Alpha
        </p>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 px-8 py-3 flex justify-between items-center z-50">
        <a href="dashboard.html" class="flex flex-col items-center text-slate-400 hover:text-blue-600">
            <i class="fa-solid fa-house-chimney text-lg"></i>
            <span class="text-[10px] font-medium mt-1">Beranda</span>
        </a>
        <a href="notifikasi.html" class="flex flex-col items-center text-slate-400 hover:text-blue-600">
            <i class="fa-solid fa-bell text-lg"></i>
            <span class="text-[10px] font-medium mt-1">Notifikasi</span>
        </a>
        <a href="profil.html" class="flex flex-col items-center text-blue-700">
            <i class="fa-solid fa-user-gear text-lg"></i>
            <span class="text-[10px] font-bold mt-1">Profil</span>
        </a>
        <button onclick="handleLogout()" class="flex flex-col items-center text-red-400 hover:text-red-600">
            <i class="fa-solid fa-power-off text-lg"></i>
            <span class="text-[10px] font-medium mt-1">Keluar</span>
        </button>
    </nav>

    <script>
        function handleLogout() {
            if(confirm('Apakah Anda yakin ingin keluar?')) {
                window.location.href = "login.html";
            }
        }
    </script>
</body>
</html>
