<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Usulan Baru - Sikessda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .step-content { display: none; }
        .step-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <div class="bg-blue-700 p-6 flex items-center sticky top-0 z-50 shadow-md">
        <a href="dashboard.html" class="text-white mr-4">
            <i class="fa-solid fa-arrow-left text-xl"></i>
        </a>
        <div>
            <h1 class="text-white font-bold text-lg leading-none">Buat Usulan Baru</h1>
            <p class="text-blue-200 text-[10px] uppercase font-medium mt-1 tracking-wider">Pengajuan Bantuan Sosial</p>
        </div>
    </div>

    <div class="px-6 py-4 bg-white border-b border-slate-100 flex justify-between items-center mb-6">
        <div class="flex items-center space-x-2">
            <div id="badge-1" class="w-7 h-7 bg-blue-700 text-white rounded-full flex items-center justify-center text-xs font-bold">1</div>
            <span class="text-[10px] font-bold text-slate-400">IDENTITAS</span>
        </div>
        <div class="h-[2px] w-8 bg-slate-100"></div>
        <div class="flex items-center space-x-2">
            <div id="badge-2" class="w-7 h-7 bg-slate-200 text-slate-500 rounded-full flex items-center justify-center text-xs font-bold">2</div>
            <span class="text-[10px] font-bold text-slate-400">KRITERIA</span>
        </div>
        <div class="h-[2px] w-8 bg-slate-100"></div>
        <div class="flex items-center space-x-2">
            <div id="badge-3" class="w-7 h-7 bg-slate-200 text-slate-500 rounded-full flex items-center justify-center text-xs font-bold">3</div>
            <span class="text-[10px] font-bold text-slate-400">DOKUMEN</span>
        </div>
    </div>

    <div class="px-6">
        <form id="usulanForm" class="space-y-6">
            
            <div id="step-1" class="step-content active animate-in fade-in">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
                    <h3 class="font-bold text-slate-800 border-b pb-2 mb-4">Data Individu</h3>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">Nomor Kartu Keluarga (KK)</label>
                        <input type="number" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none" placeholder="737301XXXXXXXXXX">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">NIK Pengusul</label>
                        <input type="number" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none" placeholder="Masukkan 16 digit NIK">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">Jenis Bansos</label>
                        <select class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none text-sm">
                            <option>Pilih Jenis Bantuan</option>
                            <option>PKH (Program Keluarga Harapan)</option>
                            <option>BPNT (Sembako)</option>
                            <option>PBI-JK (Kesehatan)</option>
                        </select>
                    </div>
                    <button type="button" onclick="goToStep(2)" class="w-full bg-blue-700 text-white font-bold py-4 rounded-xl mt-4">Selanjutnya</button>
                </div>
            </div>

            <div id="step-2" class="step-content animate-in fade-in">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
                    <h3 class="font-bold text-slate-800 border-b pb-2 mb-4">Survey Kondisi Ekonomi</h3>
                    <div class="space-y-4">
                        <label class="block text-sm font-medium text-slate-700 leading-tight">Apakah dinding rumah terbuat dari kayu/bambu berkualitas rendah?</label>
                        <div class="flex space-x-4">
                            <label class="flex-1 text-center py-3 border border-slate-200 rounded-xl cursor-pointer hover:bg-blue-50 transition-all has-[:checked]:bg-blue-100 has-[:checked]:border-blue-600">
                                <input type="radio" name="dinding" class="hidden"> Ya
                            </label>
                            <label class="flex-1 text-center py-3 border border-slate-200 rounded-xl cursor-pointer hover:bg-blue-50 transition-all has-[:checked]:bg-blue-100 has-[:checked]:border-blue-600">
                                <input type="radio" name="dinding" class="hidden"> Tidak
                            </label>
                        </div>
                    </div>
                    <div class="space-y-4 pt-4">
                        <label class="block text-sm font-medium text-slate-700 leading-tight">Berapa rata-rata pendapatan keluarga per bulan?</label>
                        <select class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm">
                            <option>< Rp 600.000</option>
                            <option>Rp 600.000 - Rp 1.500.000</option>
                            <option>> Rp 1.500.000</option>
                        </select>
                    </div>
                    <div class="flex space-x-2 pt-4">
                        <button type="button" onclick="goToStep(1)" class="flex-1 border-2 border-slate-100 text-slate-400 font-bold py-4 rounded-xl">Kembali</button>
                        <button type="button" onclick="goToStep(3)" class="flex-[2] bg-blue-700 text-white font-bold py-4 rounded-xl">Selanjutnya</button>
                    </div>
                </div>
            </div>

            <div id="step-3" class="step-content animate-in fade-in">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-6">
                    <h3 class="font-bold text-slate-800 border-b pb-2 mb-4">Dokumentasi Lapangan</h3>
                    
                    <div class="border-2 border-dashed border-slate-200 rounded-2xl p-8 text-center bg-slate-50">
                        <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fa-solid fa-camera text-2xl"></i>
                        </div>
                        <h4 class="font-bold text-sm text-slate-700">Foto Tampak Depan Rumah</h4>
                        <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-tighter">Format JPG/PNG, Maksimal 2MB</p>
                        <input type="file" id="fotoRumah" class="hidden" accept="image/*">
                        <button type="button" onclick="document.getElementById('fotoRumah').click()" class="mt-4 bg-white border border-blue-600 text-blue-600 text-xs font-bold px-4 py-2 rounded-lg">Pilih File</button>
                    </div>

                    <div class="bg-blue-50 p-4 rounded-xl flex items-start space-x-3">
                        <i class="fa-solid fa-circle-info text-blue-600 mt-1"></i>
                        <p class="text-[11px] text-blue-800 leading-relaxed font-medium">Dengan menekan tombol simpan, data akan dikirim ke sistem untuk diverifikasi oleh Admin Desa & Dinsos.</p>
                    </div>

                    <div class="flex space-x-2">
                        <button type="button" onclick="goToStep(2)" class="flex-1 border-2 border-slate-100 text-slate-400 font-bold py-4 rounded-xl">Kembali</button>
                        <button type="submit" class="flex-[2] bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-emerald-100">Kirim Usulan</button>
                    </div>
                </div>
            </div>

        </form>
    </div>

    <script>
        function goToStep(step) {
            // Sembunyikan semua konten
            document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
            // Tampilkan step yang dipilih
            document.getElementById('step-' + step).classList.add('active');
            
            // Update Stepper Badge
            for(let i=1; i<=3; i++) {
                const badge = document.getElementById('badge-' + i);
                if(i <= step) {
                    badge.classList.replace('bg-slate-200', 'bg-blue-700');
                    badge.classList.replace('text-slate-500', 'text-white');
                } else {
                    badge.classList.replace('bg-blue-700', 'bg-slate-200');
                    badge.classList.replace('text-white', 'text-slate-500');
                }
            }
            window.scrollTo(0,0);
        }

        document.getElementById('usulanForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Terima kasih! Usulan Anda berhasil disimpan dan sedang dalam proses verifikasi.");
            window.location.href = "dashboard.html";
        });
    </script>
</body>
</html>
